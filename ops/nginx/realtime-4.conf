resolver 127.0.0.11 valid=10s ipv6=off;

upstream realtime_backend {
  zone realtime_backend 64k;
  least_conn;
  server realtime-service-1:8081 resolve;
  server realtime-service-2:8081 resolve;
  server realtime-service-3:8081 resolve;
  server realtime-service-4:8081 resolve;
}

server {
  listen 8081;

  location /ws/ {
    proxy_pass http://realtime_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
