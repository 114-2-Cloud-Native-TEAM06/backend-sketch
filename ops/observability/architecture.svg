<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" font-family="'Microsoft JhengHei','PingFang TC','Noto Sans CJK TC',sans-serif">
  <defs>
    <linearGradient id="svc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6aa6e6"/><stop offset="1" stop-color="#4781cf"/>
    </linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6fd6"/><stop offset="1" stop-color="#3f4cab"/>
    </linearGradient>
    <linearGradient id="tempo" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0a55a"/><stop offset="1" stop-color="#e07d2e"/></linearGradient>
    <linearGradient id="mimir" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6aa6e6"/><stop offset="1" stop-color="#4781cf"/></linearGradient>
    <linearGradient id="loki"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5cc08a"/><stop offset="1" stop-color="#36a06a"/></linearGradient>
    <linearGradient id="pyro"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b079db"/><stop offset="1" stop-color="#8a4fc0"/></linearGradient>
    <linearGradient id="dash"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a4150"/><stop offset="1" stop-color="#272d39"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1d2a44" flood-opacity="0.28"/>
    </filter>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7d93ae"/>
    </marker>
    <marker id="arwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b079db"/>
    </marker>
  </defs>

  <rect width="1320" height="720" fill="#f4f7fb"/>
  <text x="40" y="44" font-size="26" font-weight="700" fill="#22314c">可觀測性架構 — Instrument → Collect → Visualize</text>
  <text x="42" y="70" font-size="14" fill="#5b6b82">OpenTelemetry · 5 個微服務 · 四訊號 · Grafana Cloud（分服務標籤）</text>

  <!-- ① INSTRUMENT band -->
  <text x="40" y="108" font-size="15" font-weight="700" fill="#2f6fc0">① INSTRUMENT</text>
  <text x="160" y="108" font-size="13" fill="#6b7c93">OpenTelemetry SDK · 自動埋點(HTTP / runtime) + 手動自訂指標</text>

  <!-- service boxes -->
  <g filter="url(#sh)">
    <rect x="28"   y="124" width="232" height="76" rx="13" fill="url(#svc)"/>
    <rect x="286"  y="124" width="232" height="76" rx="13" fill="url(#svc)"/>
    <rect x="544"  y="124" width="232" height="76" rx="13" fill="url(#svc)"/>
    <rect x="802"  y="124" width="232" height="76" rx="13" fill="url(#svc)"/>
    <rect x="1060" y="124" width="232" height="76" rx="13" fill="url(#svc)"/>
  </g>
  <g fill="#ffffff" text-anchor="middle">
    <text x="144"  y="156" font-size="18" font-weight="700">User</text>
    <text x="144"  y="180" font-size="12" fill="#e6eefb">:8082 · 認證 / 使用者</text>
    <text x="402"  y="156" font-size="18" font-weight="700">Chat</text>
    <text x="402"  y="180" font-size="12" fill="#e6eefb">:8080 · 聊天 / 歷史</text>
    <text x="660"  y="156" font-size="18" font-weight="700">Notification</text>
    <text x="660"  y="180" font-size="12" fill="#e6eefb">:8083 · 通知</text>
    <text x="918"  y="156" font-size="18" font-weight="700">Realtime ×2</text>
    <text x="918"  y="180" font-size="12" fill="#e6eefb">:8081 · WebSocket</text>
    <text x="1176" y="156" font-size="18" font-weight="700">Message Writer</text>
    <text x="1176" y="180" font-size="12" fill="#e6eefb">NATS 消費 → 寫 DB</text>
  </g>

  <!-- converge arrows to bus -->
  <g stroke="#7d93ae" stroke-width="2" fill="none">
    <line x1="144"  y1="200" x2="144"  y2="232"/>
    <line x1="402"  y1="200" x2="402"  y2="232"/>
    <line x1="660"  y1="200" x2="660"  y2="232"/>
    <line x1="918"  y1="200" x2="918"  y2="232"/>
    <line x1="1176" y1="200" x2="1176" y2="232"/>
    <line x1="144"  y1="232" x2="1176" y2="232"/>
    <line x1="660"  y1="232" x2="660"  y2="266" marker-end="url(#arw)"/>
  </g>
  <text x="676" y="252" font-size="12" fill="#5b6b82">OTLP / HTTP (protobuf)</text>

  <!-- ② COLLECT -->
  <text x="40" y="300" font-size="15" font-weight="700" fill="#3f4cab">② COLLECT</text>
  <text x="160" y="300" font-size="13" fill="#6b7c93">Direct 模式 · 免自架 Collector</text>
  <g filter="url(#sh)">
    <rect x="468" y="272" width="384" height="78" rx="14" fill="url(#gw)"/>
  </g>
  <text x="660" y="305" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">Grafana Cloud</text>
  <text x="660" y="330" font-size="15" fill="#dfe3fb" text-anchor="middle">OTLP Gateway</text>

  <!-- gateway -> backends -->
  <g stroke="#7d93ae" stroke-width="2" fill="none">
    <line x1="660" y1="350" x2="660" y2="382"/>
    <line x1="300"  y1="382" x2="1020" y2="382"/>
    <line x1="300"  y1="382" x2="300"  y2="430" marker-end="url(#arw)"/>
    <line x1="540"  y1="382" x2="540"  y2="430" marker-end="url(#arw)"/>
    <line x1="780"  y1="382" x2="780"  y2="430" marker-end="url(#arw)"/>
  </g>
  <!-- pyroscope separate ingest (dashed) -->
  <g stroke="#b079db" stroke-width="2" fill="none" stroke-dasharray="6 5">
    <line x1="1176" y1="200" x2="1176" y2="408"/>
    <line x1="1176" y1="408" x2="1020" y2="408"/>
    <line x1="1020" y1="408" x2="1020" y2="430" marker-end="url(#arwd)"/>
  </g>

  <!-- ③ VISUALIZE -->
  <text x="40" y="420" font-size="15" font-weight="700" fill="#36a06a">③ VISUALIZE</text>
  <text x="160" y="420" font-size="13" fill="#6b7c93">Grafana Cloud</text>

  <!-- signal labels -->
  <g text-anchor="middle" font-size="12" font-weight="700">
    <text x="300"  y="424" fill="#e07d2e">Traces</text>
    <text x="540"  y="424" fill="#3f7fce">Metrics</text>
    <text x="780"  y="424" fill="#2f9560">Logs</text>
    <text x="1020" y="424" fill="#8a4fc0">Profiles</text>
  </g>
  <!-- backend boxes -->
  <g filter="url(#sh)">
    <rect x="195" y="430" width="210" height="72" rx="13" fill="url(#tempo)"/>
    <rect x="435" y="430" width="210" height="72" rx="13" fill="url(#mimir)"/>
    <rect x="675" y="430" width="210" height="72" rx="13" fill="url(#loki)"/>
    <rect x="915" y="430" width="210" height="72" rx="13" fill="url(#pyro)"/>
  </g>
  <g fill="#fff" text-anchor="middle">
    <text x="300"  y="468" font-size="18" font-weight="700">Tempo</text>
    <text x="300"  y="490" font-size="11" fill="#fff3e6">跨服務追蹤</text>
    <text x="540"  y="468" font-size="18" font-weight="700">Mimir</text>
    <text x="540"  y="490" font-size="11" fill="#e8f0fc">指標 / Prometheus</text>
    <text x="780"  y="468" font-size="18" font-weight="700">Loki</text>
    <text x="780"  y="490" font-size="11" fill="#e6f7ee">結構化日誌</text>
    <text x="1020" y="468" font-size="18" font-weight="700">Pyroscope</text>
    <text x="1020" y="490" font-size="11" fill="#f3e9fb">連續效能剖析</text>
  </g>

  <!-- backends -> dashboard -->
  <g stroke="#7d93ae" stroke-width="2" fill="none">
    <line x1="300"  y1="502" x2="300"  y2="540"/>
    <line x1="540"  y1="502" x2="540"  y2="540"/>
    <line x1="780"  y1="502" x2="780"  y2="540"/>
    <line x1="1020" y1="502" x2="1020" y2="540"/>
    <line x1="300"  y1="540" x2="1020" y2="540"/>
    <line x1="660"  y1="540" x2="660"  y2="572" marker-end="url(#arw)"/>
  </g>

  <!-- dashboard -->
  <g filter="url(#sh)">
    <rect x="360" y="578" width="600" height="74" rx="14" fill="url(#dash)"/>
  </g>
  <text x="660" y="610" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Grafana Dashboard</text>
  <text x="660" y="634" font-size="12" fill="#aeb9cb" text-anchor="middle">分服務下鑽 · DB / HTTP / WebSocket · traces↔logs↔metrics 關聯</text>

  <!-- footnotes -->
  <text x="40" y="690" font-size="12" fill="#8794a6">每服務帶 service_name 標籤　·　OBSERVABILITY_ENABLED 總開關　·　Span 內 Token 脫敏</text>
  <text x="40" y="708" font-size="12" fill="#9a6fc0">虛線 = Profiles 走 Pyroscope 專屬 ingest 端點（不經 OTLP Gateway）</text>
</svg>
