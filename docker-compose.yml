name: backend-sketch

x-backend-service: &backend-service
  image: backend-sketch-backend-dev
  build:
    context: ./backend
    dockerfile: Dockerfile.dev
  volumes:
    - ./backend:/app
    - /app/node_modules
  environment:
    NODE_ENV: development
    DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
    REDIS_URL: redis://redis:6379
    NATS_URL: nats://nats-0:4222
    JWT_SECRET: dev_secret_change_in_prod
    API_VERSION: "1"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

x-realtime-service: &realtime-service
  <<: *backend-service
  command: npx tsx watch services/realtime-service/src/main.ts
  environment:
    NODE_ENV: development
    DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
    REDIS_URL: redis://redis:6379
    NATS_URL: nats://nats-0:4222
    NATS_SHARD_URLS: "${NATS_SHARD_URLS:-nats://nats-0:4222,nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222}"
    JWT_SECRET: dev_secret_change_in_prod
    WS_PORT: "8081"
    WS_RATE_LIMIT_MODE: "off"
    REALTIME_DISABLE_NATS_PUBLISH: "${REALTIME_DISABLE_NATS_PUBLISH:-false}"
    MESSAGE_WRITE_SHARD_COUNT: "${MESSAGE_WRITE_SHARD_COUNT:-4}"
    REALTIME_NATS_PUBLISH_TIMEOUT_MS: "${REALTIME_NATS_PUBLISH_TIMEOUT_MS:-5000}"
    REALTIME_NATS_PUBLISH_MAX_IN_FLIGHT: "${REALTIME_NATS_PUBLISH_MAX_IN_FLIGHT:-8192}"
    LOAD_METRICS_LOG_INTERVAL_MS: "${LOAD_METRICS_LOG_INTERVAL_MS:-5000}"
    REALTIME_METRICS_PORT: "9091"
    WS_PRELOAD_ROOMS: "${WS_PRELOAD_ROOMS:-true}"
    WS_SEND_BUFFER_LIMIT_BYTES: "${WS_SEND_BUFFER_LIMIT_BYTES:-1048576}"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats-0:
      condition: service_healthy
    nats-1:
      condition: service_healthy
    nats-2:
      condition: service_healthy
    nats-3:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9091/health >/dev/null"]
    interval: 5s
    timeout: 5s
    retries: 20

services:
  chat-service:
    <<: *backend-service
    command: npx tsx watch services/chat-service/src/main.ts
    ports:
      - "${CHAT_SERVICE_HOST_PORT:-8080}:8080"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod
      API_VERSION: "1"
      CHAT_SERVICE_PORT: "8080"
      REST_RATE_LIMIT_PER_MINUTE: "${REST_RATE_LIMIT_PER_MINUTE:-10000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    <<: *backend-service
    command: npx tsx watch services/user-service/src/main.ts
    ports:
      - "${USER_SERVICE_HOST_PORT:-8082}:8082"
      - "${PRISMA_STUDIO_HOST_PORT:-5555}:5555"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-0:4222
      JWT_SECRET: dev_secret_change_in_prod
      API_VERSION: "1"
      USER_SERVICE_PORT: "8082"
      REST_AUTH_RATE_LIMIT_PER_MINUTE: "${REST_AUTH_RATE_LIMIT_PER_MINUTE:-10000}"
      REST_RATE_LIMIT_PER_MINUTE: "${REST_RATE_LIMIT_PER_MINUTE:-10000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8082/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  notification-service:
    <<: *backend-service
    command: npx tsx watch services/notification-service/src/main.ts
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8083}:8083"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod
      API_VERSION: "1"
      NOTIFICATION_SERVICE_PORT: "8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8083/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  realtime-service-1:
    <<: *realtime-service
    hostname: realtime-service-1

  realtime-service-2:
    <<: *realtime-service
    hostname: realtime-service-2

  realtime-service-3:
    <<: *realtime-service
    hostname: realtime-service-3

  realtime-service-4:
    <<: *realtime-service
    hostname: realtime-service-4

  realtime-gateway:
    image: nginx:1.27-alpine
    ports:
      - "${WS_HOST_PORT:-8081}:8081"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/realtime-4.conf:/etc/nginx/conf.d/default.conf:ro
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    depends_on:
      realtime-service-1:
        condition: service_healthy
        restart: true
      realtime-service-2:
        condition: service_healthy
        restart: true
      realtime-service-3:
        condition: service_healthy
        restart: true
      realtime-service-4:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  message-writer-service: &message-writer-service
    <<: *backend-service
    hostname: message-writer-service
    command: npx tsx watch services/message-writer-service/src/main.ts
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-0:4222
      JWT_SECRET: dev_secret_change_in_prod
      MESSAGE_WRITER_BATCH_SIZE: "${MESSAGE_WRITER_BATCH_SIZE:-250}"
      MESSAGE_WRITER_BATCH_FLUSH_MS: "${MESSAGE_WRITER_BATCH_FLUSH_MS:-50}"
      MESSAGE_WRITER_BATCH_CONCURRENCY: "${MESSAGE_WRITER_BATCH_CONCURRENCY:-4}"
      MESSAGE_WRITER_MAX_MESSAGES: "${MESSAGE_WRITER_MAX_MESSAGES:-512}"
      MESSAGE_WRITE_SHARD_COUNT: "${MESSAGE_WRITE_SHARD_COUNT:-4}"
      MESSAGE_WRITE_SHARD_INDEX: "0"
      MESSAGE_WRITE_MAX_ACK_PENDING: "${MESSAGE_WRITE_MAX_ACK_PENDING:-4096}"
      MESSAGE_WRITER_DISABLE_FANOUT: "${MESSAGE_WRITER_DISABLE_FANOUT:-true}"
      LOAD_METRICS_LOG_INTERVAL_MS: "${LOAD_METRICS_LOG_INTERVAL_MS:-5000}"
      MESSAGE_WRITER_METRICS_PORT: "9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-0:
        condition: service_healthy
    cpus: "${MESSAGE_WRITER_CPUS:-1.0}"
    mem_limit: "${MESSAGE_WRITER_MEM_LIMIT:-768m}"

  message-writer-1:
    <<: *message-writer-service
    hostname: message-writer-1
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-1:4222
      JWT_SECRET: dev_secret_change_in_prod
      MESSAGE_WRITER_BATCH_SIZE: "${MESSAGE_WRITER_BATCH_SIZE:-250}"
      MESSAGE_WRITER_BATCH_FLUSH_MS: "${MESSAGE_WRITER_BATCH_FLUSH_MS:-50}"
      MESSAGE_WRITER_BATCH_CONCURRENCY: "${MESSAGE_WRITER_BATCH_CONCURRENCY:-4}"
      MESSAGE_WRITER_MAX_MESSAGES: "${MESSAGE_WRITER_MAX_MESSAGES:-512}"
      MESSAGE_WRITE_SHARD_COUNT: "${MESSAGE_WRITE_SHARD_COUNT:-4}"
      MESSAGE_WRITE_SHARD_INDEX: "1"
      MESSAGE_WRITE_MAX_ACK_PENDING: "${MESSAGE_WRITE_MAX_ACK_PENDING:-4096}"
      MESSAGE_WRITER_DISABLE_FANOUT: "${MESSAGE_WRITER_DISABLE_FANOUT:-true}"
      LOAD_METRICS_LOG_INTERVAL_MS: "${LOAD_METRICS_LOG_INTERVAL_MS:-5000}"
      MESSAGE_WRITER_METRICS_PORT: "9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-1:
        condition: service_healthy

  message-writer-2:
    <<: *message-writer-service
    hostname: message-writer-2
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-2:4222
      JWT_SECRET: dev_secret_change_in_prod
      MESSAGE_WRITER_BATCH_SIZE: "${MESSAGE_WRITER_BATCH_SIZE:-250}"
      MESSAGE_WRITER_BATCH_FLUSH_MS: "${MESSAGE_WRITER_BATCH_FLUSH_MS:-50}"
      MESSAGE_WRITER_BATCH_CONCURRENCY: "${MESSAGE_WRITER_BATCH_CONCURRENCY:-4}"
      MESSAGE_WRITER_MAX_MESSAGES: "${MESSAGE_WRITER_MAX_MESSAGES:-512}"
      MESSAGE_WRITE_SHARD_COUNT: "${MESSAGE_WRITE_SHARD_COUNT:-4}"
      MESSAGE_WRITE_SHARD_INDEX: "2"
      MESSAGE_WRITE_MAX_ACK_PENDING: "${MESSAGE_WRITE_MAX_ACK_PENDING:-4096}"
      MESSAGE_WRITER_DISABLE_FANOUT: "${MESSAGE_WRITER_DISABLE_FANOUT:-true}"
      LOAD_METRICS_LOG_INTERVAL_MS: "${LOAD_METRICS_LOG_INTERVAL_MS:-5000}"
      MESSAGE_WRITER_METRICS_PORT: "9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-2:
        condition: service_healthy

  message-writer-3:
    <<: *message-writer-service
    hostname: message-writer-3
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:password@postgres:5432/imdb
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-3:4222
      JWT_SECRET: dev_secret_change_in_prod
      MESSAGE_WRITER_BATCH_SIZE: "${MESSAGE_WRITER_BATCH_SIZE:-250}"
      MESSAGE_WRITER_BATCH_FLUSH_MS: "${MESSAGE_WRITER_BATCH_FLUSH_MS:-50}"
      MESSAGE_WRITER_BATCH_CONCURRENCY: "${MESSAGE_WRITER_BATCH_CONCURRENCY:-4}"
      MESSAGE_WRITER_MAX_MESSAGES: "${MESSAGE_WRITER_MAX_MESSAGES:-512}"
      MESSAGE_WRITE_SHARD_COUNT: "${MESSAGE_WRITE_SHARD_COUNT:-4}"
      MESSAGE_WRITE_SHARD_INDEX: "3"
      MESSAGE_WRITE_MAX_ACK_PENDING: "${MESSAGE_WRITE_MAX_ACK_PENDING:-4096}"
      MESSAGE_WRITER_DISABLE_FANOUT: "${MESSAGE_WRITER_DISABLE_FANOUT:-true}"
      LOAD_METRICS_LOG_INTERVAL_MS: "${LOAD_METRICS_LOG_INTERVAL_MS:-5000}"
      MESSAGE_WRITER_METRICS_PORT: "9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-3:
        condition: service_healthy

  test:
    image: backend-sketch-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm test"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://admin:password@postgres-test:5432/imdb_test
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats-0:4222
      JWT_SECRET: dev_secret_change_in_prod
      API_VERSION: "1"
    depends_on:
      postgres-test:
        condition: service_healthy
      nats-0:
        condition: service_healthy
    profiles:
      - test

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imdb_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imdb_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - test

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats-0: &nats-service
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data/jetstream", "-m", "8222"]
    ports:
      - "${NATS_HOST_PORT:-4222}:4222"
      - "${NATS_MONITOR_HOST_PORT:-8222}:8222"
    volumes:
      - nats_0_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats-1:
    <<: *nats-service
    ports:
      - "${NATS_1_HOST_PORT:-4223}:4222"
      - "${NATS_1_MONITOR_HOST_PORT:-8223}:8222"
    volumes:
      - nats_1_data:/data

  nats-2:
    <<: *nats-service
    ports:
      - "${NATS_2_HOST_PORT:-4224}:4222"
      - "${NATS_2_MONITOR_HOST_PORT:-8224}:8222"
    volumes:
      - nats_2_data:/data

  nats-3:
    <<: *nats-service
    ports:
      - "${NATS_3_HOST_PORT:-4225}:4222"
      - "${NATS_3_MONITOR_HOST_PORT:-8225}:8222"
    volumes:
      - nats_3_data:/data

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - chat-service
      - user-service
      - realtime-service-1
      - realtime-service-2
      - realtime-service-3
      - realtime-service-4
      - message-writer-service
      - message-writer-1
      - message-writer-2
      - message-writer-3
      - cadvisor
      - postgres-exporter
      - redis-exporter
      - nats-exporter-0
      - nats-exporter-1
      - nats-exporter-2
      - nats-exporter-3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles:
      - monitoring
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:password@postgres:5432/imdb?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nats-exporter-0: &nats-exporter
    image: natsio/prometheus-nats-exporter:0.15.0
    profiles:
      - monitoring
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz=all", "http://nats-0:8222"]
    depends_on:
      nats-0:
        condition: service_healthy
    restart: unless-stopped

  nats-exporter-1:
    <<: *nats-exporter
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz=all", "http://nats-1:8222"]
    depends_on:
      nats-1:
        condition: service_healthy

  nats-exporter-2:
    <<: *nats-exporter
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz=all", "http://nats-2:8222"]
    depends_on:
      nats-2:
        condition: service_healthy

  nats-exporter-3:
    <<: *nats-exporter
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz=all", "http://nats-3:8222"]
    depends_on:
      nats-3:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_0_data:
  nats_1_data:
  nats_2_data:
  nats_3_data:
  prometheus_data:
  grafana_data:
