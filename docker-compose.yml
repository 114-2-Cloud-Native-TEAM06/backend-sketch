services:
  test:
    image: backend-sketch-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm test"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://admin:password@postgres-test:5432/imdb_test
      - REDIS_URL=redis://redis-test:6379
      - NATS_URL=nats://nats-test:4222
      - JWT_SECRET=dev_secret_change_in_prod
      - API_VERSION=1
      - CHAT_SERVICE_PORT=8080
      - WS_PORT=8081
      - USER_SERVICE_PORT=8082
      - NOTIFICATION_SERVICE_PORT=8083
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      nats-test:
        condition: service_healthy
    profiles:
      - test

  nats-test:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    tmpfs:
      - /tmp/nats
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

  redis-test:
    image: redis:7-alpine
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imdb_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imdb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test
