services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    init: true                # PID 1 init so SIGTERM reaches node → telemetry flush
    ports:
      - "8080:8080"   # REST
      - "8081:8081"   # WebSocket
      - "5555:5555"   # Prisma Studio
    volumes:
      - ./backend:/app        # 本機 code → container，改檔案即時生效
      - /app/node_modules     # node_modules 不被本機蓋掉
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://admin:password@postgres:5432/imdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_secret_change_in_prod
      - API_VERSION=1
      # ── Observability ──
      # Defaults point at the local obs-net stack. To ship to a hosted backend
      # (e.g. Grafana Cloud), put the values in a `.env` file next to this
      # compose (see .env.grafana-cloud.example) — they override the defaults.
      - OTEL_SERVICE_NAME=im-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://lgtm:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - PYROSCOPE_SERVER_ADDRESS=${PYROSCOPE_SERVER_ADDRESS:-http://lgtm:4040}
      - PYROSCOPE_BASIC_AUTH_USER=${PYROSCOPE_BASIC_AUTH_USER:-}
      - PYROSCOPE_BASIC_AUTH_PASSWORD=${PYROSCOPE_BASIC_AUTH_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default     # reach postgres / redis
      - obs-net     # reach lgtm (OTLP) / pyroscope
    restart: unless-stopped

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm test"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://admin:password@postgres-test:5432/imdb_test
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_secret_change_in_prod
      - API_VERSION=1
    depends_on:
      postgres-test:
        condition: service_healthy
    profiles:
      - test

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imdb_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imdb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"           # 本機可用 DBeaver / psql 直連
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"           # 本機可用 RedisInsight 直連
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
  obs-net:
    external: true   # create once: docker network create obs-net

volumes:
  postgres_data:
  redis_data:
