name: backend-sketch-writer

services:
  message-writer-service:
    image: backend-sketch-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npx tsx watch services/message-writer-service/src/main.ts
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:password@postgres:5432/imdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      MESSAGE_WRITER_BATCH_SIZE: ${MESSAGE_WRITER_BATCH_SIZE:-250}
      MESSAGE_WRITER_BATCH_FLUSH_MS: ${MESSAGE_WRITER_BATCH_FLUSH_MS:-50}
      MESSAGE_WRITER_BATCH_CONCURRENCY: ${MESSAGE_WRITER_BATCH_CONCURRENCY:-4}
      MESSAGE_WRITER_MAX_MESSAGES: ${MESSAGE_WRITER_MAX_MESSAGES:-512}
      MESSAGE_WRITE_MAX_ACK_PENDING: ${MESSAGE_WRITE_MAX_ACK_PENDING:-4096}
      MESSAGE_WRITER_DISABLE_FANOUT: ${MESSAGE_WRITER_DISABLE_FANOUT:-true}
      LOAD_METRICS_LOG_INTERVAL_MS: ${LOAD_METRICS_LOG_INTERVAL_MS:-5000}
    cpus: "${MESSAGE_WRITER_CPUS:-1.0}"
    mem_limit: "${MESSAGE_WRITER_MEM_LIMIT:-768m}"
    restart: unless-stopped
    networks:
      - backend-sketch-net

networks:
  backend-sketch-net:
    name: backend-sketch-net
    external: true
